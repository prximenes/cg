<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>07 — Exemplo completo (igual ao slide)</title>
</head>
<body>
<h3>Exemplo completo — Escala com ponto fixo (110, 50), fator 2</h3>
<canvas id="myCanvas" width="500" height="300" style="border:1px solid #ccc"></canvas>

<script>
const canvas = document.getElementById('myCanvas');
const ctx = canvas.getContext('2d');

function desenhaCasa() {
  ctx.beginPath();
  ctx.moveTo(100, 100); ctx.lineTo(120, 100);
  ctx.lineTo(120, 50);  ctx.lineTo(110, 30); // telhado
  ctx.lineTo(100, 50);  ctx.closePath();
  ctx.fillStyle = 'red'; ctx.fill();
}

ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.setTransform(1, 0, 0, 1, 0, 0); // reset

// Escala com ponto fixo (110, 50) - de BAIXO para CIMA
ctx.translate(110, 50);     // 3a op: volta
ctx.scale(2, 2);            // 2a op: escala
ctx.translate(-110, -50);   // 1a op: leva p/ origem
desenhaCasa();
</script>
</body>
</html>
