<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>02 — ctx.rotate e ctx.scale</title>
</head>
<body>
<h3>ctx.rotate() e ctx.scale()</h3>
<canvas id="c" width="700" height="350" style="border:1px solid #ccc"></canvas>
<script>
const ctx = document.getElementById('c').getContext('2d');

// --- Rotação ---
ctx.fillStyle = 'gray';
ctx.fillRect(100, 100, 80, 50);
ctx.fillText('original', 100, 95);

ctx.save();
ctx.rotate(Math.PI / 6);  // 30 graus (em radianos!)
ctx.fillStyle = 'blue';
ctx.fillRect(100, 100, 80, 50);
ctx.fillText('rotate(PI/6) = 30°', 100, 95);
ctx.restore();

// --- Escala ---
ctx.save();
ctx.scale(2, 1.5);
ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
ctx.fillRect(200, 150, 80, 50);
ctx.fillText('scale(2, 1.5)', 200, 145);
ctx.restore();

// Original na mesma posição para comparar
ctx.fillStyle = 'gray';
ctx.fillRect(200, 150, 80, 50);
</script>
</body>
</html>
